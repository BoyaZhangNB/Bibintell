<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibin Debug Console</title>
  <link rel="stylesheet" href="debugger.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Bibin Debug Console</h1>
      <button id="refreshBtn">Refresh</button>
    </header>

    <!-- Study Session Info -->
    <section class="card">
      <h2>📚 Study Session</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Study Topic:</label>
          <span id="studyTopic" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Session Status:</label>
          <span id="sessionStatus" class="value status-badge">Inactive</span>
        </div>
        <div class="info-item">
          <label>Total Duration:</label>
          <span id="totalDuration" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Elapsed Time:</label>
          <span id="elapsedTime" class="value">-</span>
        </div>
      </div>
    </section>

    <!-- Backend Stats -->
    <section class="card">
      <h2>🧠 Backend Statistics</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Similarity History Length:</label>
          <span id="historyLength" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Vector Store Size:</label>
          <span id="vectorStoreSize" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Drift Detected:</label>
          <span id="driftDetected" class="value status-badge">-</span>
        </div>
        <div class="info-item">
          <label>Recent Average Score:</label>
          <span id="recentAverage" class="value">-</span>
        </div>
      </div>
    </section>

    <!-- Similarity Score Chart -->
    <section class="card">
      <h2>📊 Similarity Score History</h2>
      <div id="similarityChart" class="chart-container">
        <p class="no-data">No data available</p>
      </div>
    </section>

    <!-- Tab Relevancy History -->
    <section class="card">
      <h2>📑 Recent Tab Relevancy History</h2>
      <div id="relevancyHistory" class="history-container">
        <p class="no-data">No history available</p>
      </div>
    </section>

    <footer>
      <p>Last updated: <span id="lastUpdate">-</span></p>
    </footer>
  </div>

  <script src="debugger.js"></script>
</body>
</html>
