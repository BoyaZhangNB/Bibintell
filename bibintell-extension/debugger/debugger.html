<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibin Debug Console</title>
  <link rel="stylesheet" href="debugger.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Bibin Debug Console</h1>
      <div class="header-actions">
        <button id="refreshBtn">Refresh</button>
      </div>
    </header>

    <section class="card">
      <h2>Study Session</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Study Topic</label>
          <span id="studyTopic" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Session Status</label>
          <span id="sessionStatus" class="value status-badge">Inactive</span>
        </div>
        <div class="info-item">
          <label>Total Duration</label>
          <span id="totalDuration" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Elapsed Time</label>
          <span id="elapsedTime" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Total Pages Checked</label>
          <span id="totalPages" class="value">0</span>
        </div>
        <div class="info-item">
          <label>Relevant Pages</label>
          <span id="relevantPages" class="value">0</span>
        </div>
        <div class="info-item">
          <label>Interventions</label>
          <span id="interventions" class="value">0</span>
        </div>
        <div class="info-item">
          <label>Distraction Sites</label>
          <span id="distractionSites" class="value">None</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Popup and Runtime State</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Active Tab</label>
          <span id="activeTab" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Active URL</label>
          <span id="activeUrl" class="value mono">-</span>
        </div>
        <div class="info-item">
          <label>bibinDone</label>
          <span id="bibinDone" class="value">-</span>
        </div>
        <div class="info-item">
          <label>bibinShown</label>
          <span id="bibinShown" class="value">-</span>
        </div>
        <div class="info-item">
          <label>startupIntroPending</label>
          <span id="startupIntroPending" class="value">-</span>
        </div>
        <div class="info-item">
          <label>startupIntroSource</label>
          <span id="startupIntroSource" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Last Bibin Decision</label>
          <span id="lastDecision" class="value">-</span>
        </div>
        <div class="info-item">
          <label>Last Active Tab</label>
          <span id="lastActiveTab" class="value">-</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Backend Status</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>API Reachability</label>
          <span id="backendReachability" class="value status-badge">Unknown</span>
        </div>
        <div class="info-item">
          <label>Debug Endpoint Message</label>
          <span id="backendMessage" class="value">-</span>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Recent Relevancy History</h2>
      <div id="relevancyHistory" class="history-container">
        <p class="no-data">No history available</p>
      </div>
    </section>

    <section class="card">
      <h2>Event Log (Newest First)</h2>
      <div id="eventLog" class="history-container">
        <p class="no-data">No events captured yet</p>
      </div>
    </section>

    <footer>
      <p>Last updated: <span id="lastUpdate">-</span></p>
    </footer>
  </div>

  <script src="debugger.js"></script>
</body>
</html>
